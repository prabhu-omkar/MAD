<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculator-container">
        <!-- Display Screen -->
        <input type="text" id="display" readonly placeholder="0">

        <!-- Calculator Buttons (Normal Keypad Layout) -->
        <div class="buttons-grid">
            <button class="btn btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn btn-operator" onclick="appendValue('/')">/</button>
            <button class="btn btn-operator" onclick="appendValue('*')">*</button>
            <button class="btn btn-operator" onclick="appendValue('-')">-</button>

            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn btn-operator rowspan-2" onclick="appendValue('+')">+</button>

            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>

            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            <button class="btn btn-equal rowspan-2" onclick="calculateResult()">=</button>

            <button class="btn colspan-2" onclick="appendValue('0')">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
