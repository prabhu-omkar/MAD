<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form class="survey-form">
        <!-- submission state -->
        <input type="checkbox" id="form-submitted" class="submit-trigger">

        <h1>Feedback Survey</h1>
        <p class="subtitle">Please let us know how we did</p>

        <div class="form-group">
            <label class="field-label">Name</label>
            <input type="text" required class="input-text">
        </div>

        <div class="form-group">
            <label class="field-label">Rating</label>
            <div class="rating-options">
                <input type="radio" id="rate-1" name="rating" value="1">
                <label for="rate-1">1</label>
                <input type="radio" id="rate-2" name="rating" value="2">
                <label for="rate-2">2</label>
                <input type="radio" id="rate-3" name="rating" value="3" checked>
                <label for="rate-3">3</label>
                <input type="radio" id="rate-4" name="rating" value="4">
                <label for="rate-4">4</label>
                <input type="radio" id="rate-5" name="rating" value="5">
                <label for="rate-5">5</label>
            </div>
        </div>

        <div class="form-group">
            <label class="field-label">Comments</label>
            <textarea rows="3"></textarea>
        </div>

        <label for="form-submitted" class="submit-btn-label">Submit</label>

        <!-- Simpler submission success card -->
        <div class="success-overlay">
            <div class="success-card">
                <h2>Submitted!</h2>
                <button type="reset" class="reset-btn">Close</button>
            </div>
        </div>
    </form>
</body>
</html>
